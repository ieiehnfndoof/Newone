<!DOCTYPE html>
<html>
<head>
    <title>MALASKA V2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #0a0a0f;
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .snowflake {
            position: absolute;
            color: #ffffff;
            font-size: 1em;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            opacity: 0.8;
        }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: auto;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .menu-btn {
            background: #1a1a2e;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
        }
        .title { text-align: center; flex-grow: 1; }
        .title h1 {
            font-size: 28px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .title h1 span { color: #00ffff; }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1a1a2e;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .stat-item { text-align: center; font-size: 14px; }
        .stat-item .number {
            font-size: 18px;
            font-weight: bold;
            color: #00ffff;
        }
        .exit-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .section {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333355;
        }
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #eeeeee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .box {
            background: #252540;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .box .num {
            font-size: 36px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .box .label { font-size: 14px; color: #bbbbbb; }
        .generator-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-box {
            background: #252540;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .input-box label {
            display: block;
            font-size: 14px;
            color: #bbbbbb;
            margin-bottom: 8px;
        }
        .input-box input, .input-box select {
            width: 100%;
            background: #1a1a2e;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }
        .generate-btn {
            width: 100%;
            background: linear-gradient(45deg, #00ffff, #0088ff);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        .recent-box {
            background: #252540;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            color: #bbbbbb;
        }
        .hidden { display: none !important; }
        .login-panel {
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 20px;
            padding: 40px 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.1);
            margin: 50px auto;
            position: relative;
            z-index: 10;
        }
        .login-panel h1 {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
        }
        .login-panel .subtitle {
            color: #888888;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .login-panel input {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #444444;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .login-panel button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            margin-top: 10px;
            cursor: pointer;
        }
        .login-panel .status {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-panel .light {
            width: 12px;
            height: 12px;
            background-color: #00ff44;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff44;
        }
        .login-panel .text { color: #888888; font-size: 13px; }
        .login-panel .link { color: #00ff44; font-size: 12px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="snow" id="snow"></div>

<div id="loginPage" class="login-panel">
    <h1>MALASKA V2</h1>
    <div class="subtitle">SECURE LOGIN</div>
    <input type="text" id="user" placeholder="USERNAME">
    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="login()">🔒 SIGN IN</button>
    <div class="status">
        <div class="light"></div>
        <div class="text">SYSTEM ONLINE</div>
    </div>
    <div class="link" onclick="showSignup()">Don't have account? Sign Up</div>
</div>

<div id="signupPage" class="login-panel hidden">
    <h1>CREATE ACCOUNT</h1>
    <div class="subtitle">REGISTER NEW USER</div>
    <input type="text" placeholder="FULL NAME">
    <input type="email" placeholder="EMAIL">
    <input type="password" placeholder="CREATE PASSWORD">
    <input type="text" id="refCode" placeholder="REFERRAL CODE">
    <button onclick="register()">✅ CREATE ACCOUNT</button>
    <div class="link" onclick="showLogin()">Back to Login</div>
</div>

<div id="dashboardPage" class="container hidden">
    <div class="header">
        <button class="menu-btn">☰</button>
        <div class="title">
            <h1>👑 MALASKA <span>V2</span></h1>
            <button class="exit-btn" onclick="logout()">⮐ Exit</button>
        </div>
    </div>
    <div class="stats-bar">
        <div class="stat-item">
            <div>🔑</div>
            <div class="number" id="topKeys">0</div>
            <div>Keys</div>
        </div>
        <div class="stat-item">
            <div>📄</div>
            <div class="number" id="topFiles">0</div>
            <div>Files</div>
        </div>
        <div class="stat-item">
            <div>💰</div>
            <div class="number" id="topBalance">1,000,000</div>
            <div>Balance</div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">📉 Statistics</div>
        <div class="grid">
            <div class="box">
                <div class="num" id="totalKeys">0</div>
                <div class="label">Total Keys</div>
            </div>
            <div class="box">
                <div class="num" id="totalFiles">0</div>
                <div class="label">.SO Files</div>
            </div>
            <div class="box">
                <div class="num" id="totalRefCodes">0</div>
                <div class="label">Referral Codes</div>
            </div>
            <div class="box">
                <div class="num" id="totalRefs">0</div>
                <div class="label">Referrals</div>
            </div>
        </div>
    </div>
    <div class="generator-area">
        <div>
            <div class="section-title">⚡ Quick Key Generator</div>
            <div class="input-box">
                <label>Prefix</label>
                <input type="text" id="prefix" value="MALASKA">
            </div>
            <div class="input-box">
                <label>Duration</label>
                <select id="duration">
                    <option>30 DAYS</option>
                    <option>1 YEAR</option>
                    <option>LIFETIME</option>
                </select>
            </div>
            <div class="input-box">
                <label>Hours</label>
                <select id="hours">
                    <option>10 HOURS</option>
                    <option>24 HOURS</option>
                </select>
            </div>
            <div class="input-box">
                <label>Devices</label>
                <select id="devices">
                    <option>1 DEVICE</option>
                    <option>5 DEVICES</option>
                    <option>100 DEVICES</option>
                </select>
            </div>
            <button class="generate-btn" onclick="generateKey()">✨ Generate Key</button>
        </div>
        <div>
            <div class="section-title">🔄 Recent Keys</div>
            <div class="recent-box" id="recentKeys">No keys yet</div>
        </div>
    </div>
</div>

<script>
const CORRECT_USER = "Jogo";
const CORRECT_PASS = "valorantmaster12345";

let keyCount = 0;
let fileCount = 0;
let balance = 1000000;

window.onload = function() {
    startSnow();
};

function startSnow() {
    const snow = document.getElementById('snow');
    for(let i=0; i<80; i++) {
        const snowflake = document.createElement('div');
        snowflake.classList.add('snowflake');
        snowflake.innerHTML = "❄";
        snowflake.style.left = Math.random() * window.innerWidth + 'px';
        snowflake.style.animationDuration = Math.random() * 5 + 3 + 's';
        snowflake.style.opacity = Math.random();
        snowflake.style.fontSize = Math.random() * 8 + 8 + 'px';
        snow.appendChild(snowflake);
    }
}

function createSnow() {
    const snow = document.getElementById('snow');
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.innerHTML = "❄";
    snowflake.style.left = Math.random() * window.innerWidth + 'px';
    snowflake.style.animationDuration = Math.random() * 5 + 3 + 's';
    snowflake.style.opacity = Math.random();
    snowflake.style.fontSize = Math.random() * 8 + 8 + 'px';
    snow.appendChild(snowflake);
    setTimeout(() => { snowflake.remove(); }, 8000);
}

setInterval(createSnow, 150);

function updateStats() {
    document.getElementById('topKeys').innerText = keyCount;
    document.getElementById('topFiles').innerText = fileCount;
    document.getElementById('topBalance').innerText = balance.toLocaleString();
    document.getElementById('totalKeys').innerText = keyCount;
    document.getElementById('totalFiles').innerText = fileCount;
    document.getElementById('totalRefCodes').innerText = refCodeCount;
    document.getElementById('totalRefs').innerText = referralCount;
}

function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    if(user === CORRECT_USER && pass === CORRECT_PASS) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        updateStats();
    } else {
        alert("❌ WRONG USERNAME OR PASSWORD!");
    }
}

function showSignup() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('signupPage').classList.remove('hidden');
}

function showLogin() {
    document.getElementById('signupPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
}

function register() {
    const ref = document.getElementById('refCode').value;
    if(ref === CORRECT_REF) {
        alert("✅ ACCOUNT CREATED SUCCESSFULLY!");
        referralCount++;
        refCodeCount++;
        balance += 50000;
        updateStats();
        showLogin();
    } else {
        alert("❌ INVALID REFERRAL CODE!");
    }
}
